name: Build & Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload assets to (e.g. v0.1.5). Required for workflow_dispatch.'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $t = "${{ github.event.inputs.release_tag }}"
          } else {
            $t = "${{ github.ref_name }}"
          }
          Write-Host "tag=$t"
          echo "value=$t" >> $env:GITHUB_OUTPUT

      - name: Check version parity
        shell: pwsh
        run: |
          $pkg = (Get-Content package.json | ConvertFrom-Json).version
          $tauri = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargo = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"(.+)"').Matches.Groups[1].Value
          Write-Host "package.json=$pkg  tauri.conf.json=$tauri  Cargo.toml=$cargo"
          if ($pkg -ne $tauri -or $pkg -ne $cargo) {
            Write-Error "Version mismatch! All three files must agree."
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache bundled Node download
        uses: actions/cache@v4
        with:
          path: .cache/node
          key: bundled-node-v22.11.0-${{ runner.os }}

      - name: Build
        shell: pwsh
        run: .\build-windows.ps1 -SkipToolchainCheck

      - name: Package and upload release assets
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.tag.outputs.value }}"
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe found in bundle/nsis/"
            exit 1
          }
          $zip = "MashupForge-$tag.zip"
          Compress-Archive -Path $exe.FullName -DestinationPath $zip -Force

          # Create release if it doesn't already exist
          $releaseExists = gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "MashupForge $tag" --notes "Windows installer and portable ZIP."
          }

          # Upload assets — --clobber replaces if already present
          gh release upload $tag $exe.FullName --asset-name "MashupForge-$tag-setup.exe" --clobber
          gh release upload $tag $zip --asset-name "MashupForge-$tag.zip" --clobber
          Write-Host "Assets uploaded to release $tag"
