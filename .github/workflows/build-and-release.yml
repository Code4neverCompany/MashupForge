name: Build & Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload assets to (e.g. v0.1.5). Required for workflow_dispatch.'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"

      - name: Check version parity
        run: |
          pkg=$(grep '"version"' package.json | sed 's/.*"version": "\(.*\)".*/\1/')
          tauri=$(grep '"version"' src-tauri/tauri.conf.json | sed 's/.*"version": "\(.*\)".*/\1/')
          cargo=$(grep '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "package.json=$pkg  tauri.conf.json=$tauri  Cargo.toml=$cargo"
          if [ "$pkg" != "$tauri" ] || [ "$pkg" != "$cargo" ]; then
            echo "::error::Version mismatch! All three files must agree."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install dependencies
        run: |
          npm ci
          sudo apt-get update -qq
          sudo apt-get install -y -qq nsis

      - name: Build portable
        run: bash scripts/build-portable.sh

      - name: Build NSIS installer
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          VERSION="${TAG#v}"
          makensis \
            -DAPP_DIR="$PWD/dist/portable/MashupForge" \
            -DOUT_EXE="$PWD/dist/portable/MashupForge-${TAG}-setup.exe" \
            -DVERSION="$VERSION" \
            scripts/installer.nsi

      - name: Upload release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          ZIP="dist/portable/MashupForge-portable.zip"
          EXE="dist/portable/MashupForge-${TAG}-setup.exe"

          if [ ! -f "$EXE" ]; then
            echo "::error::NSIS installer not found at $EXE"
            ls -la dist/portable/
            exit 1
          fi

          gh release create "$TAG" --title "MashupForge $TAG" --notes "Windows installer and portable ZIP." 2>/dev/null || true
          gh release upload "$TAG" "$EXE" --clobber
          gh release upload "$TAG" "$ZIP" --clobber
          echo "Assets uploaded to release $TAG"
