name: GitHub Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version parity
        shell: pwsh
        run: |
          $pkg = (Get-Content package.json | ConvertFrom-Json).version
          $tauri = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargo = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"(.+)"').Matches.Groups[1].Value
          Write-Host "package.json=$pkg  tauri.conf.json=$tauri  Cargo.toml=$cargo"
          if ($pkg -ne $tauri -or $pkg -ne $cargo) {
            Write-Error "Version mismatch! All three files must agree."
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Next.js
        run: npm ci && npm run build

      - name: Copy standalone
        shell: pwsh
        run: .\scripts\copy-standalone-to-resources.ps1

      - name: Fetch Node.js
        shell: pwsh
        run: .\scripts\fetch-windows-node.ps1

      - name: Build Tauri
        run: cargo tauri build
        working-directory: src-tauri

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
