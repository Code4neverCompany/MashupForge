name: GitHub Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version parity
        shell: pwsh
        run: |
          $pkg = (Get-Content package.json | ConvertFrom-Json).version
          $tauri = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargo = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"(.+)"').Matches.Groups[1].Value
          Write-Host "package.json=$pkg  tauri.conf.json=$tauri  Cargo.toml=$cargo"
          if ($pkg -ne $tauri -or $pkg -ne $cargo) {
            Write-Error "Version mismatch! All three files must agree."
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache bundled Node download
        uses: actions/cache@v4
        with:
          path: .cache/node
          key: bundled-node-v22.11.0-${{ runner.os }}

      - name: Build
        shell: pwsh
        run: .\build-windows.ps1 -SkipToolchainCheck

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: MashupForge ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: mashupforge-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: mashupforge-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: warn
