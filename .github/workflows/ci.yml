name: CI

# V040-002: shared CI for the three release branches.
# Tag-triggered Tauri NSIS release stays in tauri-windows.yml; this
# workflow only runs the cheap, branch-agnostic checks (tsc + tests +
# next build) so regressions surface before they reach a release branch.
on:
  push:
    branches: [main, web, desktop]
  pull_request:
    branches: [main, web, desktop]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Mirrors tauri-windows.yml: Bun primary for ~40× faster installs,
      # Node still set up because the build script chains node and the
      # npm fallback below needs it.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.12'

      - name: Cache Bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install (Bun primary)
        id: bun_install
        continue-on-error: true
        run: bun install --frozen-lockfile

      - name: Install (npm fallback)
        if: steps.bun_install.outcome == 'failure'
        run: |
          echo "::warning::Bun install failed; falling back to npm. Investigate Bun step output."
          npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npx vitest run

      - name: Next build
        run: npx next build
