name: Build Windows Installer

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check version parity
        shell: pwsh
        run: |
          $pkg = (Get-Content package.json | ConvertFrom-Json).version
          $tauri = (Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json).version
          $cargo = (Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"(.+)"').Matches.Groups[1].Value
          Write-Host "package.json=$pkg  tauri.conf.json=$tauri  Cargo.toml=$cargo"
          if ($pkg -ne $tauri -or $pkg -ne $cargo) {
            Write-Error "Version mismatch! All three files must agree."
            exit 1
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Cache bundled Node download
        uses: actions/cache@v4
        with:
          path: .cache/node
          key: bundled-node-v22.11.0-${{ runner.os }}

      - name: Build
        shell: pwsh
        run: .\build-windows.ps1 -SkipToolchainCheck

      - name: Upload EXE installer
        uses: actions/upload-artifact@v4
        with:
          name: mashupforge-windows-exe
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $exe = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          Compress-Archive -Path $exe.FullName -DestinationPath "MashupForge-$version-windows-x64.zip" -Force
          Write-Host "Created MashupForge-$version-windows-x64.zip"

      - name: Upload ZIP archive
        uses: actions/upload-artifact@v4
        with:
          name: mashupforge-windows-zip
          path: MashupForge-*-windows-x64.zip
          if-no-files-found: error

      - name: Create GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: MashupForge ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload EXE to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: src-tauri/target/release/bundle/nsis/*.exe
          asset_name: MashupForge-${{ github.ref_name }}-windows-x64-setup.exe
          asset_content_type: application/octet-stream

      - name: Upload ZIP to Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: MashupForge-*-windows-x64.zip
          asset_name: MashupForge-${{ github.ref_name }}-windows-x64.zip
          asset_content_type: application/zip
