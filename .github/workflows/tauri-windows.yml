name: tauri-windows

on:
  push:
    branches: [main]
    paths:
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/tauri-windows.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build Windows installers
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install JS dependencies
        run: npm ci

      - name: Build Tauri (MSI + NSIS)
        # frontendDist is a Vercel URL, so Tauri skips the frontend build
        # step and only compiles the Rust shell that wraps the remote webview.
        run: npm run tauri:build
        env:
          CARGO_TERM_COLOR: always

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: mashupforge-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: mashupforge-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
