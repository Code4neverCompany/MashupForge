name: Tauri Windows Build

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to upload assets to (e.g. v0.1.5). Required for workflow_dispatch.'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "value=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"

      - name: Check version parity
        shell: bash
        run: |
          pkg=$(grep '"version"' package.json | sed 's/.*"version": "\(.*\)".*/\1/')
          tauri=$(grep '"version"' src-tauri/tauri.conf.json | sed 's/.*"version": "\(.*\)".*/\1/')
          cargo=$(grep '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')
          echo "package.json=$pkg  tauri.conf.json=$tauri  Cargo.toml=$cargo"
          if [ "$pkg" != "$tauri" ] || [ "$pkg" != "$cargo" ]; then
            echo "::error::Version mismatch! All three files must agree."
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: '22', cache: 'npm' }

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js (standalone)
        run: npm run build

      - name: Fetch Windows Node runtime
        shell: pwsh
        run: scripts/fetch-windows-node.ps1

      - name: Copy standalone into Tauri resources
        shell: pwsh
        run: scripts/copy-standalone-to-resources.ps1

      - name: Strip non-Windows sharp bindings from bundled app
        shell: pwsh
        working-directory: src-tauri/resources/app/node_modules/@img
        run: |
          # Linux build pulls linux+linuxmusl sharp bindings into
          # .next/standalone. They're dead weight on Windows (~33 MB
          # across libvips + sharp). Must run BEFORE the npm install
          # step below so the win32 bindings it fetches survive.
          Get-ChildItem -Directory | Where-Object {
            $_.Name -like '*linux*' -or $_.Name -like '*darwin*'
          } | ForEach-Object {
            Write-Host "Removing $($_.Name)"
            Remove-Item -Recurse -Force $_.FullName
          }

      - name: Install native Windows deps into bundled app
        shell: pwsh
        working-directory: src-tauri/resources/app
        run: npm install --force --os=win32 --cpu=x64 @img/sharp-win32-x64 @next/swc-win32-x64-msvc

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build Tauri bundle
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npx tauri build

      - name: Upload release assets (installer + updater manifest + signature)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.value }}"
          BUNDLE_DIR="src-tauri/target/release/bundle/nsis"
          EXE=$(ls "$BUNDLE_DIR"/*.exe 2>/dev/null | head -n1)
          SIG=$(ls "$BUNDLE_DIR"/*.exe.sig 2>/dev/null | head -n1)
          LATEST="$BUNDLE_DIR/latest.json"

          if [ -z "$EXE" ] || [ ! -f "$EXE" ]; then
            echo "::error::Tauri NSIS .exe not found under $BUNDLE_DIR"
            ls -la "$BUNDLE_DIR" || true
            exit 1
          fi
          if [ -z "$SIG" ] || [ ! -f "$SIG" ]; then
            echo "::error::Signature (.exe.sig) not found under $BUNDLE_DIR — signing env vars missing?"
            ls -la "$BUNDLE_DIR" || true
            exit 1
          fi

          # Tauri v2 with bundle.createUpdaterArtifacts=true sometimes still
          # does not emit latest.json for the NSIS target. If it's missing,
          # synthesize one from the .sig + .exe we already have so the
          # updater endpoint has something to serve. jq handles JSON
          # escaping of the multi-line minisign signature properly —
          # heredoc would produce invalid JSON.
          if [ ! -f "$LATEST" ]; then
            echo "latest.json not emitted by Tauri; generating it manually"
            jq -n \
              --arg version "${TAG#v}" \
              --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              --arg signature "$(cat "$SIG")" \
              --arg url "https://github.com/Code4neverCompany/MashupForge/releases/download/$TAG/$(basename "$EXE")" \
              '{
                version: $version,
                notes: "",
                pub_date: $pub_date,
                platforms: {
                  "windows-x86_64": { signature: $signature, url: $url }
                }
              }' > "$LATEST"
          fi

          echo "Uploading $EXE, $SIG, and $LATEST to release $TAG"
          gh release create "$TAG" --title "MashupForge $TAG" --notes "Tauri desktop build for Windows." 2>/dev/null || true
          gh release upload "$TAG" "$EXE" --clobber
          gh release upload "$TAG" "$SIG" --clobber
          gh release upload "$TAG" "$LATEST" --clobber
          echo "Uploaded installer, signature, and updater manifest to $TAG"
