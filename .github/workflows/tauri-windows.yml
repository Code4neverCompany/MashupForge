name: tauri-windows

# Triggers:
#   - push to main           : every commit to main builds a fresh .msi
#     so we always have a current artifact pinned to HEAD
#   - push tag v*.*.*        : release build that also drafts a GitHub Release
#     with both installers attached
#   - workflow_dispatch      : manual trigger from the Actions tab, useful
#     for retrying a flaky build without a new commit
on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

# Cancel an in-flight build of the same ref if a new commit lands — we
# only care about the latest main build and latest per-tag build. Different
# refs (main vs a tag) are in separate concurrency groups so tag releases
# never cancel each other.
concurrency:
  group: tauri-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 45
    # softprops/action-gh-release@v2 needs contents:write to create the
    # draft release on tag pushes. Without this, repos with restricted
    # default GITHUB_TOKEN permissions 403 on the first tag build.
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Persists the Node.js Windows portable zip fetched by
      # scripts/fetch-windows-node.ps1 across runs so we don't hit
      # nodejs.org on every build. Key is pinned to the Node version
      # the script hardcodes, so bumping that version busts the cache.
      - name: Cache bundled Node download
        uses: actions/cache@v4
        with:
          path: .cache/node
          key: bundled-node-v22.11.0-${{ runner.os }}

      # Single source of truth — build-windows.ps1 runs the same pipeline
      # a developer runs locally (fetch-node → next build → copy-standalone
      # → tauri build). pi.dev is NOT baked into resources; it's installed
      # at runtime on first app launch into %APPDATA%\MashupForge\pi. The
      # -SkipToolchainCheck flag bypasses the upfront tool check because
      # the runner already provisioned node + rust via the earlier steps.
      - name: Build
        shell: pwsh
        run: .\build-windows.ps1 -SkipToolchainCheck

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: mashupforge-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: mashupforge-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*-setup.exe
          if-no-files-found: error

      # On tag pushes, also create a draft GitHub Release with both
      # installers attached. Drafts let Maurice review + publish
      # manually rather than auto-shipping every tag.
      - name: Draft release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          draft: true
          name: MashupForge ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
