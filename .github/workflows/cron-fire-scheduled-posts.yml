name: cron-fire-scheduled-posts

# SCHED-POST-ROBUST: hits /api/social/cron-fire on the deployed app
# every 5 minutes so scheduled posts publish even when no browser is
# open. Workflow_dispatch is exposed for manual smoke tests.
#
# Required GitHub Actions secrets:
#   APP_URL              — base URL of the deployed app (e.g.
#                          https://mashupforge.vercel.app). NO trailing slash.
#   CRON_SHARED_SECRET   — must match the same env var on the server.
#                          Generate with: openssl rand -hex 32
#
# The server also needs UPSTASH_REDIS_REST_URL + UPSTASH_REDIS_REST_TOKEN
# in its env (Vercel project settings) for the queue to be readable.

on:
  schedule:
    # Every 5 minutes. GitHub Actions cron is best-effort, not exact —
    # under heavy load runs may be delayed up to ~15 minutes. That is
    # acceptable for "fire scheduled posts": worst case a post is late
    # by a quarter hour, and the queue is durable across runs.
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  # Don't pile up overlapping runs if the queue takes longer than the
  # cron interval to drain. Latest run wins; in-flight is canceled.
  group: cron-fire-scheduled-posts
  cancel-in-progress: false

jobs:
  fire:
    name: POST /api/social/cron-fire
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Sanity-check required secrets
        run: |
          if [ -z "${{ secrets.APP_URL }}" ]; then
            echo "::error::APP_URL secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SHARED_SECRET }}" ]; then
            echo "::error::CRON_SHARED_SECRET secret is not set"
            exit 1
          fi
      - name: Fire due posts
        env:
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SHARED_SECRET: ${{ secrets.CRON_SHARED_SECRET }}
        run: |
          set -euo pipefail
          # --fail-with-body so 401/503 from the server fail the job loudly,
          # while still printing the JSON error body for debugging.
          curl --fail-with-body \
               --silent \
               --show-error \
               --max-time 240 \
               -X POST \
               -H "Authorization: Bearer ${CRON_SHARED_SECRET}" \
               -H "Content-Type: application/json" \
               "${APP_URL}/api/social/cron-fire"
          echo
