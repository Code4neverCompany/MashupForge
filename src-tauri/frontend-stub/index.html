<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MashupForge</title>
    <style>
      :root { color-scheme: dark; }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background: #050505;
        font-family: 'Space Grotesk', 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow: hidden;
      }

      /* Subtle depth glow centred on the logo area */
      body::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 70% 50% at 50% 42%,
          rgba(197,160,98,0.055) 0%, transparent 68%);
        pointer-events: none;
      }

      /* ── Layout ──────────────────────────────────────────────────── */
      .wrap {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
      }

      /* ── Logo mark: three concentric rings ───────────────────────── */
      /*   Outer gold ring + inner blue ring + gold centre dot          */
      /*   Abstract multiverse / crossover symbol                       */
      .logo-mark {
        position: relative;
        width: 56px;
        height: 56px;
        margin-bottom: 1.75rem;
        flex-shrink: 0;
      }
      .ring {
        position: absolute;
        border-radius: 50%;
      }
      .ring-outer {
        inset: 0;
        border: 1.5px solid rgba(197,160,98,0.55);
        animation: ring-breathe 3s ease-in-out infinite;
      }
      .ring-mid {
        inset: 10px;
        border: 1.5px solid rgba(0,230,255,0.45);
        animation: ring-breathe 3s ease-in-out infinite 0.45s;
      }
      .ring-dot {
        width: 8px;
        height: 8px;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: #c5a062;
        box-shadow: 0 0 10px rgba(197,160,98,0.9), 0 0 20px rgba(197,160,98,0.35);
        animation: dot-glow 3s ease-in-out infinite 0.9s;
      }

      @keyframes ring-breathe {
        0%, 100% { opacity: 0.55; transform: scale(1);    }
        50%       { opacity: 1;    transform: scale(1.05); }
      }
      @keyframes dot-glow {
        0%, 100% { box-shadow: 0 0 8px  rgba(197,160,98,0.8), 0 0 16px rgba(197,160,98,0.3); }
        50%       { box-shadow: 0 0 14px rgba(197,160,98,1),   0 0 28px rgba(197,160,98,0.5); }
      }

      /* ── Wordmark ────────────────────────────────────────────────── */
      .wordmark {
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #c5a062;
        margin-bottom: 0.3rem;
        /* subtle gold shimmer on the text */
        background: linear-gradient(90deg, #a07840, #c5a062 40%, #e8c987 55%, #c5a062 70%, #a07840);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: word-shimmer 4s linear infinite;
      }
      @keyframes word-shimmer {
        0%   { background-position: 100% center; }
        100% { background-position: -100% center; }
      }

      /* ── Tagline ─────────────────────────────────────────────────── */
      .tagline {
        font-size: 0.575rem;
        font-weight: 500;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: rgba(0,230,255,0.45);
        margin-bottom: 2.25rem;
      }

      /* ── Gold rule ───────────────────────────────────────────────── */
      .rule {
        width: 100px;
        height: 1px;
        background: linear-gradient(90deg, transparent, rgba(197,160,98,0.45), transparent);
        margin-bottom: 2.25rem;
      }

      /* ── Spinner ─────────────────────────────────────────────────── */
      .spinner-wrap {
        position: relative;
        width: 30px;
        height: 30px;
        margin-bottom: 0.9rem;
        flex-shrink: 0;
      }
      .spinner-track {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1.5px solid rgba(0,230,255,0.1);
      }
      .spinner-arc {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1.5px solid transparent;
        border-top-color: #00e6ff;
        box-shadow: 0 0 8px rgba(0,230,255,0.45);
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* ── Status ──────────────────────────────────────────────────── */
      .msg {
        font-size: 0.675rem;
        letter-spacing: 0.07em;
        color: #3f3f46;
      }
    </style>
  </head>
  <body>
    <div class="wrap">

      <div class="logo-mark" aria-hidden="true">
        <div class="ring ring-outer"></div>
        <div class="ring ring-mid"></div>
        <div class="ring ring-dot"></div>
      </div>

      <div class="wordmark">MashupForge</div>
      <div class="tagline">Multiverse Mashup Studio</div>
      <div class="rule" aria-hidden="true"></div>

      <div class="spinner-wrap" aria-hidden="true">
        <div class="spinner-track"></div>
        <div class="spinner-arc"></div>
      </div>
      <div class="msg" role="status" aria-live="polite">Starting local server…</div>

    </div>
  </body>
</html>
