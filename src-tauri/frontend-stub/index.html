<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MashupForge</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #09090b;
        color: #a1a1aa;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      .wrap {
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
      }
      .mark {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #10b981;
      }
      .msg {
        font-size: 0.875rem;
        color: #71717a;
      }
      .spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid #27272a;
        border-top-color: #10b981;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark">MashupForge</div>
      <div class="spinner" aria-hidden="true"></div>
      <div class="msg">Starting local server…</div>
    </div>
  </body>
</html>
